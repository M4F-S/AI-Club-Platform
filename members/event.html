<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Event — 42 Berlin AI Club</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://unpkg.com/lucide@1.21.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/ai-club/members/members.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23120a0d'/%3E%3Cpath d='M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z' fill='%23ff6b8a'/%3E%3C/svg%3E">
  <style>
    .event-header {
      margin-bottom: 32px;
      padding-bottom: 24px;
      border-bottom: 1px solid var(--border);
    }
    .event-header h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 4vw, 2.5rem);
      margin-bottom: 12px;
    }
    .event-meta {
      color: var(--text-muted);
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .event-type-badge {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 100px;
      background: var(--color-accent);
      color: #fff;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-right: 8px;
    }
    .event-description {
      line-height: 1.7;
      color: var(--text);
      margin-top: 16px;
    }

    /* Slide viewer */
    .slide-viewer {
      background: var(--color-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      margin-bottom: 24px;
    }
    .slide-main {
      position: relative;
      width: 100%;
      aspect-ratio: 16/9;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .slide-main img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .slide-nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      transition: background 0.2s;
      z-index: 2;
    }
    .slide-nav:hover { background: rgba(0,0,0,0.7); }
    .slide-nav.prev { left: 12px; }
    .slide-nav.next { right: 12px; }
    .slide-counter {
      position: absolute;
      bottom: 12px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,0.6);
      color: #fff;
      padding: 6px 14px;
      border-radius: 100px;
      font-size: 0.85rem;
      z-index: 2;
    }
    .slide-fullscreen {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 2;
    }
    .slide-thumbnails {
      display: flex;
      gap: 8px;
      padding: 12px;
      overflow-x: auto;
      background: var(--color-surface);
      border-top: 1px solid var(--border);
    }
    .slide-thumb {
      flex-shrink: 0;
      width: 80px;
      height: 56px;
      border-radius: 6px;
      overflow: hidden;
      cursor: pointer;
      border: 2px solid transparent;
      opacity: 0.6;
      transition: all 0.2s;
    }
    .slide-thumb:hover { opacity: 0.9; }
    .slide-thumb.active {
      border-color: var(--color-accent);
      opacity: 1;
    }
    .slide-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* Materials section */
    .materials-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 16px;
    }
    .material-card {
      background: var(--color-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .material-card:hover {
      transform: translateY(-2px);
      box-shadow: var(--shadow);
    }
    .material-icon {
      font-size: 2rem;
      margin-bottom: 12px;
    }
    .material-card h3 {
      font-family: var(--font-heading);
      font-size: 1.1rem;
      margin-bottom: 6px;
    }
    .material-card p {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.95rem;
      margin-bottom: 16px;
    }
    .back-link:hover { color: var(--color-accent); }

    .hidden-material {
      background: repeating-linear-gradient(
        45deg,
        var(--color-bg),
        var(--color-bg) 10px,
        var(--color-surface) 10px,
        var(--color-surface) 20px
      );
      border: 1px dashed var(--border);
      padding: 20px;
      border-radius: var(--radius);
      text-align: center;
      color: var(--text-muted);
    }

    @media (max-width: 768px) {
      .slide-nav { width: 36px; height: 36px; font-size: 16px; }
      .slide-nav.prev { left: 6px; }
      .slide-nav.next { right: 6px; }
      .slide-thumb { width: 60px; height: 42px; }
      .materials-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="member-header">
    <div class="container member-header-inner">
      <a href="/ai-club/members/index.html" class="logo" aria-label="Dashboard">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="phoenixGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:#e07a5f"/>
                <stop offset="50%" style="stop-color:#ff6b8a"/>
                <stop offset="100%" style="stop-color:#f2cc8f"/>
              </linearGradient>
            </defs>
            <path d="M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z" fill="url(#phoenixGrad)"/>
          </svg>
        </div>
        42 Berlin AI Club
      </a>
      <div class="user-menu">
        <span class="user-name" id="user-name">Loading...</span>
        <button class="logout-btn" id="logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <div class="container member-layout">
    <nav class="member-nav"></nav>
    <main class="member-main">
      <a href="events.html" class="back-link">← Back to events</a>
      <div id="event-content"><p>Loading...</p></div>
    </main>
  </div>

  <script src="/ai-club/members/members.js"></script>
  <script>
  document.addEventListener("DOMContentLoaded", async () => {
    const { api } = window.MemberAPI;
    const urlParams = new URLSearchParams(window.location.search);
    const eventId = urlParams.get('id');
    const container = document.getElementById('event-content');

    if (!eventId) {
      container.innerHTML = '<div class="card"><p>Event not found.</p></div>';
      return;
    }

    const res = await api('/events/' + eventId);
    if (!res.ok) {
      container.innerHTML = '<div class="card"><p>Event not found or not available.</p></div>';
      return;
    }

    const event = res.data;
    const slides = event.materials.filter(m => m.file_type === 'slide');
    const pdfs = event.materials.filter(m => m.file_type === 'pdf');
    const quizzes = event.materials.filter(m => m.file_type === 'quiz');
    const other = event.materials.filter(m => !['slide','pdf','quiz'].includes(m.file_type));

    let html = `
      <div class="event-header animate-on-scroll">
        <div class="event-meta">
          <span class="event-type-badge">${escapeHtml(event.event_type)}</span>
          ${event.event_date ? new Date(event.event_date).toLocaleString() : 'Date TBD'}
          ${event.location ? '· ' + escapeHtml(event.location) : ''}
        </div>
        <h1>${escapeHtml(event.title)}</h1>
        ${event.description ? `<div class="event-description">${escapeHtml(event.description)}</div>` : ''}
      </div>
    `;

    // Slide viewer
    if (slides.length > 0) {
      html += `
        <div class="slide-viewer animate-on-scroll" id="slide-viewer">
          <div class="slide-main" id="slide-main">
            <img id="slide-img" src="" alt="Slide" loading="lazy">
            <button class="slide-nav prev" id="slide-prev" aria-label="Previous slide">‹</button>
            <button class="slide-nav next" id="slide-next" aria-label="Next slide">›</button>
            <div class="slide-counter" id="slide-counter">1 / ${slides.length}</div>
            <button class="slide-fullscreen" id="slide-fullscreen" aria-label="Fullscreen">⛶</button>
          </div>
          <div class="slide-thumbnails" id="slide-thumbnails">
            ${slides.map((s, i) => `
              <div class="slide-thumb ${i === 0 ? 'active' : ''}" data-index="${i}" data-id="${s.id}">
                <img src="/ai-club/api/events/${event.id}/materials/${s.id}/download" alt="Slide ${i+1}" loading="lazy">
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // Materials section
    if (event.materials.length > 0) {
      html += `<h2 class="page-title animate-on-scroll" style="font-size: 1.5rem; margin-bottom: 16px;">Materials</h2>`;
      html += `<div class="materials-grid animate-on-scroll">`;

      [...pdfs, ...quizzes, ...other].forEach(m => {
        const icon = m.file_type === 'pdf' ? '📄' : m.file_type === 'quiz' ? '🎯' : '📎';
        const action = m.file_type === 'quiz'
          ? `<a href="quiz.html?event=${event.id}" class="btn btn-primary">Take Quiz</a>`
          : `<a href="/ai-club/api/events/${event.id}/materials/${m.id}/download" class="btn btn-primary" download>Download</a>`;
        html += `
          <div class="material-card">
            <div class="material-icon">${icon}</div>
            <h3>${escapeHtml(m.title)}</h3>
            <p>${escapeHtml(m.description || m.file_type.toUpperCase())}</p>
            ${action}
          </div>
        `;
      });
      html += `</div>`;
    } else if (!slides.length) {
      html += `<div class="card animate-on-scroll"><p>No materials available for this event yet.</p></div>`;
    }

    container.innerHTML = html;

    // Initialize slide viewer
    if (slides.length > 0) {
      let currentSlide = 0;
      const slideImg = document.getElementById('slide-img');
      const counter = document.getElementById('slide-counter');
      const thumbs = document.querySelectorAll('.slide-thumb');

      function showSlide(index) {
        if (index < 0) index = slides.length - 1;
        if (index >= slides.length) index = 0;
        currentSlide = index;
        const slide = slides[index];
        slideImg.src = `/ai-club/api/events/${event.id}/materials/${slide.id}/download`;
        counter.textContent = `${index + 1} / ${slides.length}`;
        thumbs.forEach((t, i) => t.classList.toggle('active', i === index));
      }

      showSlide(0);

      document.getElementById('slide-prev').addEventListener('click', () => showSlide(currentSlide - 1));
      document.getElementById('slide-next').addEventListener('click', () => showSlide(currentSlide + 1));
      document.getElementById('slide-fullscreen').addEventListener('click', () => {
        const viewer = document.getElementById('slide-viewer');
        if (viewer.requestFullscreen) viewer.requestFullscreen();
      });

      thumbs.forEach(thumb => {
        thumb.addEventListener('click', () => showSlide(parseInt(thumb.dataset.index)));
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') showSlide(currentSlide - 1);
        if (e.key === 'ArrowRight') showSlide(currentSlide + 1);
      });
    }

    function escapeHtml(t) {
      const d = document.createElement('div');
      d.textContent = t;
      return d.innerHTML;
    }
  });
  </script>
</body>
</html>
