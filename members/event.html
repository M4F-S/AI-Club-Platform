<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Workshop — 42 Berlin AI Club</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://unpkg.com/lucide@1.21.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/members/members.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23120a0d'/%3E%3Cpath d='M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z' fill='%23ff6b8a'/%3E%3C/svg%3E">
  <style>
    .slide-viewer { position: relative; background: #000; border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .slide-main { position: relative; padding-top: 56.25%; }
    .slide-main img { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: contain; }
    .slide-nav { position: absolute; top: 50%; transform: translateY(-50%); width: 48px; height: 48px; background: rgba(0,0,0,0.5); border: none; color: #fff; font-size: 24px; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; z-index: 2; }
    .slide-nav:hover { background: rgba(0,0,0,0.7); }
    .slide-nav.prev { left: 12px; }
    .slide-nav.next { right: 12px; }
    .slide-counter { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.6); color: #fff; padding: 4px 12px; border-radius: 20px; font-size: 14px; z-index: 2; }
    .slide-fullscreen { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.6); color: #fff; border: none; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 18px; z-index: 2; }
    .slide-thumbnails { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; }
    .slide-thumb { width: 80px; height: 56px; border-radius: 6px; overflow: hidden; cursor: pointer; opacity: 0.6; border: 2px solid transparent; flex-shrink: 0; }
    .slide-thumb.active { opacity: 1; border-color: #ff6b8a; }
    .slide-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .materials-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 16px; margin-top: 16px; }
    .material-card { background: var(--color-surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; text-align: center; }
    .material-card:hover { border-color: var(--color-accent); }
    .material-icon { font-size: 32px; margin-bottom: 8px; }
    .material-card h3 { font-size: 1rem; margin-bottom: 4px; }
    .material-card p { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 12px; }
    .hidden-material { display: none; }
    @media (max-width: 640px) {
      .slide-nav { width: 36px; height: 36px; font-size: 16px; }
      .slide-nav.prev { left: 6px; }
      .slide-nav.next { right: 6px; }
      .slide-thumb { width: 60px; height: 42px; }
      .materials-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="member-header">
    <div class="container member-header-inner">
      <a href="/members/index.html" class="logo" aria-label="Dashboard">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="phoenixGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:#e07a5f"/>
                <stop offset="50%" style="stop-color:#ff6b8a"/>
                <stop offset="100%" style="stop-color:#f2cc8f"/>
              </linearGradient>
            </defs>
            <path d="M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z" fill="url(#phoenixGrad)"/>
            <path d="M16 6 C14 9, 13 13, 14 16 C12 15, 10 15, 9 17 C8 18, 9 20, 11 21 C10 22, 11 23, 12 24 C13 24, 14 23, 15 22 C15 24, 16 25, 17 25 C18 25, 18 24, 18 22 C19 23, 20 24, 21 24 C22 23, 23 22, 22 21 C24 20, 25 18, 24 17 C23 15, 21 15, 19 16 C20 13, 19 9, 16 6 Z" fill="#faf3f0" opacity="0.4"/>
          </svg>
        </div>
        42 Berlin AI Club
      </a>
      <div class="user-menu">
        <span class="user-name" id="user-name">Loading...</span>
        <button class="logout-btn" id="logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <div class="container member-layout">
    <nav class="member-nav"></nav>
    <main class="member-main">
      <div id="event-container"><p class="loading-text">Loading workshop...</p></div>
    </main>
  </div>

  <script>
  (function() {
    function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
    
    async function loadEvent() {
      const container = document.getElementById('event-container');
      if (!window.MemberAPI) {
        container.innerHTML = '<div class="card"><p style="color:#e74c3c">Error: MemberAPI not loaded. Please refresh.</p></div>';
        return;
      }
      
      const { api } = window.MemberAPI;
      const params = new URLSearchParams(window.location.search);
      const eventId = params.get('id');
      if (!eventId) {
        container.innerHTML = '<div class="card"><p>No event selected.</p><a href="events.html" class="btn btn-primary">Back to workshops</a></div>';
        return;
      }
      
      const res = await api('/events/' + eventId);
      if (!res.ok) {
        container.innerHTML = '<div class="card"><p style="color:#e74c3c">Failed to load workshop. <button onclick="location.reload()" style="background:none;border:none;color:#ff6b8a;text-decoration:underline;cursor:pointer;">Retry</button></p></div>';
        return;
      }
      
      const event = res.data;
      const slides = event.materials.filter(m => m.file_type === 'slide' && m.is_revealed);
      const pdfs = event.materials.filter(m => m.file_type === 'pdf' && m.is_revealed);
      const quizzes = event.materials.filter(m => m.file_type === 'quiz' && m.is_revealed);
      const other = event.materials.filter(m => !['slide','pdf','quiz'].includes(m.file_type) && m.is_revealed);
      
      let html = `
        <div class="animate-on-scroll">
          <a href="events.html" style="color:var(--text-muted);font-size:0.9rem;">← Back to workshops</a>
          <h1 class="page-title" style="margin-top:8px;">${escapeHtml(event.title)}</h1>
          <p class="page-subtitle">${event.event_date ? new Date(event.event_date).toLocaleString() + (event.location ? ' · ' + escapeHtml(event.location) : '') : 'Date TBD'}</p>
        </div>
        <div class="card animate-on-scroll"><p>${escapeHtml(event.description || '')}</p></div>
      `;
      
      if (slides.length > 0) {
        html += `
          <div class="slide-viewer animate-on-scroll" id="slide-viewer">
            <div class="slide-main" id="slide-main">
              <img id="slide-img" src="" alt="Slide" loading="lazy">
              <button class="slide-nav prev" id="slide-prev" aria-label="Previous slide">‹</button>
              <button class="slide-nav next" id="slide-next" aria-label="Next slide">›</button>
              <div class="slide-counter" id="slide-counter">1 / ${slides.length}</div>
              <button class="slide-fullscreen" id="slide-fullscreen" aria-label="Fullscreen">⛶</button>
            </div>
            <div class="slide-thumbnails" id="slide-thumbnails">
              ${slides.map((s, i) => `
                <div class="slide-thumb ${i === 0 ? 'active' : ''}" data-index="${i}" data-id="${s.id}">
                  <img src="/api/events/${event.id}/materials/${s.id}/view" alt="Slide ${i+1}" loading="lazy">
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }
      
      if (event.materials.length > 0) {
        html += `<h2 class="page-title animate-on-scroll" style="font-size: 1.5rem; margin-bottom: 16px;">Materials</h2>`;
        html += `<div class="materials-grid animate-on-scroll">`;
        [...pdfs, ...quizzes, ...other].forEach(m => {
          const icon = m.file_type === 'pdf' ? '📄' : m.file_type === 'quiz' ? '🎯' : '📎';
          const action = m.file_type === 'quiz'
            ? `<a href="quiz-interactive.html?event=${event.id}" class="btn btn-primary">Take Quiz</a>`
            : `<a href="/api/events/${event.id}/materials/${m.id}/download" class="btn btn-primary" download>Download</a>`;
          html += `
            <div class="material-card">
              <div class="material-icon">${icon}</div>
              <h3>${escapeHtml(m.title)}</h3>
              <p>${escapeHtml(m.description || m.file_type.toUpperCase())}</p>
              ${action}
            </div>
          `;
        });
        html += `</div>`;
      } else if (!slides.length) {
        html += `<div class="card animate-on-scroll"><p>No materials available for this workshop yet.</p></div>`;
      }
      
      container.innerHTML = html;
      
      if (slides.length > 0) {
        let currentSlide = 0;
        const slideImg = document.getElementById('slide-img');
        const counter = document.getElementById('slide-counter');
        const thumbs = document.querySelectorAll('.slide-thumb');
        
        function showSlide(index) {
          if (index < 0) index = slides.length - 1;
          if (index >= slides.length) index = 0;
          currentSlide = index;
          const slide = slides[index];
          slideImg.src = `/api/events/${event.id}/materials/${slide.id}/view`;
          counter.textContent = `${index + 1} / ${slides.length}`;
          thumbs.forEach((t, i) => t.classList.toggle('active', i === index));
        }
        
        showSlide(0);
        
        document.getElementById('slide-prev').addEventListener('click', () => showSlide(currentSlide - 1));
        document.getElementById('slide-next').addEventListener('click', () => showSlide(currentSlide + 1));
        document.getElementById('slide-fullscreen').addEventListener('click', () => {
          const viewer = document.getElementById('slide-viewer');
          if (viewer.requestFullscreen) viewer.requestFullscreen();
        });
        
        thumbs.forEach(thumb => {
          thumb.addEventListener('click', () => showSlide(parseInt(thumb.dataset.index)));
        });
      }
      
      if (window.initScrollAnimations) window.initScrollAnimations();
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadEvent);
    } else {
      loadEvent();
    }
  })();
  </script>

  <script src="/members/members.js"></script>
</body>
</html>
