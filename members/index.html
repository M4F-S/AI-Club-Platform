<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — 42 Berlin AI Club</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://unpkg.com/lucide@1.21.0/dist/umd/lucide.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="members.css">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23120a0d'/%3E%3Cpath d='M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z' fill='%23ff6b8a'/%3E%3C/svg%3E">
</head>
<body>
  <header class="member-header">
    <div class="container member-header-inner">
      <a href="../index.html" class="logo">
        <div class="logo-icon">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="phoenixGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:#e07a5f"/>
                <stop offset="50%" style="stop-color:#ff6b8a"/>
                <stop offset="100%" style="stop-color:#f2cc8f"/>
              </linearGradient>
            </defs>
            <path d="M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z" fill="url(#phoenixGrad)"/>
            <path d="M16 6 C14 9, 13 13, 14 16 C12 15, 10 15, 9 17 C8 18, 9 20, 11 21 C10 22, 11 23, 12 24 C13 24, 14 23, 15 22 C15 24, 16 25, 17 25 C18 25, 18 24, 18 22 C19 23, 20 24, 21 24 C22 23, 23 22, 22 21 C24 20, 25 18, 24 17 C23 15, 21 15, 19 16 C20 13, 19 9, 16 6 Z" fill="#faf3f0" opacity="0.4"/>
          </svg>
        </div>
        42 Berlin AI Club
      </a>
      <div class="user-menu">
        <span class="user-name" id="user-name">Loading...</span>
        <button class="logout-btn" id="logout-btn">Log out</button>
      </div>
    </div>
  </header>

  <div class="container member-layout">
    <nav class="member-nav"></nav>
    <main class="member-main">

      <h1 class="page-title animate-on-scroll">Welcome back, <span id="welcome-name">member</span></h1>
      <p class="page-subtitle animate-on-scroll">Here is what is happening in the club right now.</p>

      <div class="grid-2">
        <div class="card animate-on-scroll stagger-1">
          <h2>Latest blog post</h2>
          <p id="latest-post">Loading...</p>
          <a href="blog/index.html" class="btn btn-primary" style="margin-top: 12px;">Read blog</a>
        </div>
        <div class="card animate-on-scroll stagger-2">
          <h2>Next event</h2>
          <p id="next-event">Loading...</p>
          <a href="events.html" class="btn btn-primary" style="margin-top: 12px;">See events</a>
        </div>
      </div>

      <div class="card animate-on-scroll">
        <h2>Quick links</h2>
        <div class="grid-2" style="margin-top: 16px;">
          <a href="resources.html" class="resource-card">
            <div class="resource-icon"><i data-lucide="book-open" style="width: 22px; height: 22px;"></i></div>
            <h3>Resources</h3>
            <p>Curated links, papers, and tutorials.</p>
          </a>
          <a href="perks.html" class="resource-card">
            <div class="resource-icon"><i data-lucide="gift" style="width: 22px; height: 22px;"></i></div>
            <h3>Partner perks</h3>
            <p>Benefits from our partners and sponsors.</p>
          </a>
        </div>
      </div>

      <script>
document.addEventListener("DOMContentLoaded", async () => {

          (async () => {
            const { api } = window.MemberAPI;
            const postsRes = await api('/posts');
            if (postsRes.ok && postsRes.data.length) {
              const p = postsRes.data[0];
              document.getElementById('latest-post').innerHTML = `<strong>${escapeHtml(p.title)}</strong><br>${escapeHtml(p.summary || p.content.slice(0, 120))}...`;
            } else {
              document.getElementById('latest-post').textContent = 'No blog posts yet. Check back soon!';
            }
            const eventsRes = await api('/events');
            if (eventsRes.ok && eventsRes.data.length) {
              const e = eventsRes.data[0];
              document.getElementById('next-event').innerHTML = `<strong>${escapeHtml(e.title)}</strong><br>${escapeHtml(e.event_date ? new Date(e.event_date).toLocaleString() : 'Date TBD')}`;
            } else {
              document.getElementById('next-event').textContent = 'No events scheduled yet.';
            }
            if (window.lucide) lucide.createIcons();
          })();
          function escapeHtml(t) { const d=document.createElement('div'); d.textContent=t; return d.innerHTML; }
      
});
</script>
    </main>
  </div>

  <script src="members.js"></script>
</body>
</html>
