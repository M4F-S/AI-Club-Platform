  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #faf8f7 0%, #fff1f2 100%);

    main {
      padding: 140px 24px 80px;

    .form-header {

      margin-bottom: 40px;
    }

    .form-header h1 {
      font-family: var(--font-heading);
      font-size: clamp(2rem, 5vw, 3rem);
      margin-bottom: 12px;
    }

    .form-header p {
      color: var(--text-muted);
      font-size: 1rem;

    .login-card {
      max-width: 460px;
      margin: 0 auto;
      background: var(--color-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 40px;
      box-shadow: var(--shadow-lg);
    }

    .login-card .form-group { margin-bottom: 22px; }
    .login-card label { font-weight: 500; font-size: 0.95rem; }
    .required { color: var(--color-accent); }

    .login-card input {
      width: 100%;
      padding: 14px 16px;
      margin-top: 8px;
      background: var(--color-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
      transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
    }

    .login-card input:focus {
      outline: none;
      border-color: var(--color-accent);
      background: var(--color-surface);
      box-shadow: 0 0 0 3px rgba(244, 63, 94, 0.12);
    }

    .login-card .btn {
      width: 100%;
      border-radius: var(--radius-sm);
    }

    .form-footer {
      text-align: center;
      margin-top: 24px;
      color: var(--text-muted);
      font-size: 0.95rem;
    }

    .form-footer a {
      color: var(--color-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .alert {
      padding: 14px 16px;
      border-radius: var(--radius-sm);
      margin-bottom: 20px;
      display: none;
    }

    .alert.show { display: block; }
    .alert.error { background: var(--color-error-bg); border: 1px solid rgba(201, 42, 42, 0.2); color: var(--color-error); }
    .alert.success { background: var(--color-success-bg); border: 1px solid rgba(42, 122, 74, 0.2); color: var(--color-success); }

    .hidden { display: none !important; }

    .password-strength {
      font-size: 0.85rem;
      margin-top: 6px;
      color: var(--text-muted);
    }

    .password-strength.weak { color: var(--color-error); }
    .password-strength.medium { color: #d97706; }
    .password-strength.strong { color: var(--color-success); }

    @media (max-width: 768px) {
      main { padding: 110px 20px 48px; }
      .login-card { padding: 28px; }
    }

<body>

  <main id="main-content">
    <div class="form-header">
      <h1>Reset <span class="text-gradient">password</span></h1>
      <p id="header-subtitle">Enter your email to receive a reset link.</p>
    </div>

    <div class="login-card">
      <div class="alert" id="alert"></div>

      <!-- Step 1: Request reset -->
      <form id="request-form">
        <div class="form-group">
          <label for="email">Email address <span class="required">*</span></label>
          <input type="email" id="email" name="email" placeholder="your@email.com" required autofocus>
        </div>

        <button type="submit" class="btn btn-primary">
          Send reset link
        </button>
      </form>

      <!-- Step 2: Reset password (shown when token in URL) -->
      <form id="reset-form" class="hidden">
        <div class="form-group">
          <label for="new-password">New password <span class="required">*</span></label>
          <input type="password" id="new-password" name="new_password" placeholder="Min 8 characters" required minlength="8">
          <div class="password-strength" id="strength"></div>
        </div>

        <div class="form-group">
          <label for="confirm-password">Confirm password <span class="required">*</span></label>
          <input type="password" id="confirm-password" name="confirm_password" placeholder="Repeat your password" required minlength="8">
        </div>

        <button type="submit" class="btn btn-primary">
          Set new password
        </button>
      </form>

      <!-- Success message -->
      <div id="success-message" class="hidden" style="text-align: center; padding: 20px 0;">
        <div style="font-size: 48px; margin-bottom: 16px;">✅</div>
        <h3 style="font-family: var(--font-heading); margin-bottom: 8px;">Password reset!</h3>
        <p style="color: var(--text-muted);">You can now <a href="login.html">log in</a> with your new password.</p>
      </div>

      <p class="form-footer">
        Remember your password? <a href="login.html">Log in</a>
      </p>
    </div>
  </main>

  <script src="/ai-club/assets/ai-club.js?v=10" defer></script>
  <script>
    const API_URL = '/ai-club/api';
    const alertEl = document.getElementById('alert');
    const requestForm = document.getElementById('request-form');
    const resetForm = document.getElementById('reset-form');
    const successMessage = document.getElementById('success-message');
    const headerSubtitle = document.getElementById('header-subtitle');
    const strengthEl = document.getElementById('strength');

    // Check for token in URL
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get('token');

    if (token) {
      requestForm.classList.add('hidden');
      resetForm.classList.remove('hidden');
      headerSubtitle.textContent = 'Enter your new password below.';
      document.title = 'Set New Password — 42 Berlin AI Club';
    }

    function showAlert(type, message) {
      alertEl.className = `alert show ${type}`;
      alertEl.textContent = message;
    }

    function clearAlert() {
      alertEl.className = 'alert';
      alertEl.textContent = '';
    }

    // Password strength indicator
    document.getElementById('new-password').addEventListener('input', (e) => {
      const val = e.target.value;
      if (val.length === 0) {
        strengthEl.textContent = '';
        strengthEl.className = 'password-strength';
        return;
      }
      if (val.length < 8) {
        strengthEl.textContent = 'Too short (min 8 characters)';
        strengthEl.className = 'password-strength weak';
      } else if (val.length < 12 || !/[A-Z]/.test(val) || !/[0-9]/.test(val)) {
        strengthEl.textContent = 'Medium — add uppercase, numbers, or make it longer';
        strengthEl.className = 'password-strength medium';
      } else {
        strengthEl.textContent = 'Strong password';
        strengthEl.className = 'password-strength strong';
      }
    });

    // Step 1: Request reset
    requestForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const email = requestForm.email.value.trim().toLowerCase();
      if (!email || !email.includes('@')) {
        showAlert('error', 'Please enter a valid email address.');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/forgot-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ email })
        });

        const result = await res.json();

        // Always show generic success message (prevent email enumeration)
        requestForm.classList.add('hidden');
        successMessage.classList.remove('hidden');
        successMessage.innerHTML = `
          <div style="font-size: 48px; margin-bottom: 16px;">📧</div>
          <h3 style="font-family: var(--font-heading); margin-bottom: 8px;">Check your email</h3>
          <p style="color: var(--text-muted);">If this email is registered, a reset link has been sent.</p>
        `;
        headerSubtitle.textContent = '';
      } catch (err) {
        showAlert('error', 'Network error. Please try again.');
      }
    });

    // Step 2: Reset password
    resetForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      clearAlert();

      const newPassword = resetForm.new_password.value;
      const confirmPassword = resetForm.confirm_password.value;

      if (newPassword.length < 8) {
        showAlert('error', 'Password must be at least 8 characters.');
        return;
      }
      if (newPassword !== confirmPassword) {
        showAlert('error', 'Passwords do not match.');
        return;
      }

      try {
        const res = await fetch(`${API_URL}/reset-password`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify({ token, new_password: newPassword })
        });

        const result = await res.json();

        if (res.ok) {
          resetForm.classList.add('hidden');
          successMessage.classList.remove('hidden');
          headerSubtitle.textContent = '';
        } else {
          showAlert('error', result.error || 'Failed to reset password. The link may have expired.');
        }
      } catch (err) {
        showAlert('error', 'Network error. Please try again.');
      }
    });
  </script>
