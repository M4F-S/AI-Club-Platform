      </ul>
    </nav>
  </header>

  <main id="main-content">
    <div class="form-header">
      <h1>Member <span class="text-gradient">login</span></h1>
      <p>Access member resources and the community area.</p>
    </div>

    <div class="login-card">
      <div class="alert" id="alert"></div>

      <form id="login-form">
        <div class="form-group">
          <label for="intra">42 Intra username <span class="required">*</span></label>
          <input type="text" id="intra" name="intra_username" placeholder="e.g. mfathy" required>
        </div>

        <div class="form-group">
          <label for="password">Password <span class="required">*</span></label>
          <input type="password" id="password" name="password" placeholder="Your password" required>
        </div>

        <button type="submit" class="btn btn-primary">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg>
          Log in
        </button>
      </form>

      <p class="form-footer" style="margin-top: 16px; margin-bottom: 8px;">
        <a href="reset-password.html">Forgot your password?</a>
      </p>
      <p class="form-footer">
        Not a member yet? <a href="become-member.html">Apply for membership</a>
      </p>
    </div>
  </main>

  <script src="/ai-club/assets/ai-club.js?v=10" defer></script>
  <script>
    const API_URL = '/ai-club/api';
    const form = document.getElementById('login-form');
    const alert = document.getElementById('alert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      alert.className = 'alert';
      alert.textContent = '';

      const data = {
        intra_username: form.intra_username.value.trim(),
        password: form.password.value
      };

      try {
        const res = await fetch(`${API_URL}/member/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'include',
          body: JSON.stringify(data)
        });

        const result = await res.json();

        if (res.ok) {
          window.location.href = 'members/index.html';
        } else {
          alert.className = 'alert show error';
          alert.textContent = result.error || 'Login failed';
        }
      } catch (err) {
        alert.className = 'alert show error';
        alert.textContent = 'Network error. Please try again.';
      }
    });
  </script>
