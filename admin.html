<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — 42 Berlin AI Club</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #faf8f7;
      --surface: #ffffff;
      --text: #1a1212;
      --text-muted: #7a6a6a;
      --accent-1: #ff6b8a;
      --accent-2: #e07a5f;
      --accent-3: #f2cc8f;
      --border: rgba(0, 0, 0, 0.08);
      --shadow: rgba(0, 0, 0, 0.08);
      --radius: 16px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
      min-height: 100vh;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
      padding: 0 24px;
    }

    main {
      padding: 100px 0 80px;
    }

    .form-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .form-header h1 {
      font-family: 'Space Grotesk', sans-serif;
      font-size: clamp(1.8rem, 5vw, 2.5rem);
    }

    .form-header h1 span {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .login-card, .admin-panel {
      max-width: 460px;
      margin: 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: 0 4px 30px var(--shadow);
    }

    .admin-panel { max-width: 900px; display: none; }

    .form-group {
      margin-bottom: 20px;
    }

    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }

    input, select, textarea {
      width: 100%;
      padding: 12px 14px;
      background: #faf8f7;
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 1rem;
    }

    input:focus, select:focus, textarea:focus {
      outline: none;
      border-color: var(--accent-1);
      background: #ffffff;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 12px 20px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent-1), var(--accent-2));
      color: #ffffff;
    }

    .btn-primary:hover { transform: translateY(-2px); }
    .btn-success { background: #2a7a4a; color: white; }
    .btn-danger { background: #c92a2a; color: white; }
    .btn-secondary { background: #e9ecef; color: var(--text); }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .tabs {
      display: flex;
      gap: 8px;
    }

    .tab {
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-weight: 500;
    }

    .tab.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .application-card {
      background: #faf8f7;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .application-card h3 {
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 4px;
    }

    .meta {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .field strong {
      display: inline-block;
      width: 140px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .member-card {
      background: #faf8f7;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .member-card .info { flex: 1; min-width: 220px; }
    .member-card .info h3 {
      font-family: 'Space Grotesk', sans-serif;
      margin-bottom: 4px;
    }
    .member-card .role {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .role-superadmin { background: #ff6b8a; color: #fff; }
    .role-admin { background: #7a9e7e; color: #fff; }
    .role-member { background: #e9ecef; color: var(--text); }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 10px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.show {
      display: block;
    }

    .alert.error {
      background: rgba(255, 107, 138, 0.08);
      border: 1px solid rgba(255, 107, 138, 0.2);
      color: #c92a2a;
    }

    .alert.success {
      background: rgba(42, 167, 110, 0.08);
      border: 1px solid rgba(42, 167, 110, 0.2);
      color: #2a7a4a;
    }

    @media (max-width: 768px) {
      .container { padding: 0 16px; }
      main { padding: 80px 0 48px; }
      .login-card, .admin-panel { padding: 24px; }
      .field strong { display: block; width: auto; }
      .actions { flex-direction: column; }
      .toolbar { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <main>
    <div class="container">
      <div class="form-header">
        <h1>Admin <span>panel</span></h1>
      </div>

      <div class="login-card" id="login-card">
        <div class="alert" id="login-alert"></div>
        <form id="admin-login-form">
          <div class="form-group">
            <label for="admin-identifier">Admin email or username</label>
            <input type="text" id="admin-identifier" name="identifier" placeholder="mfathy" required autofocus>
          </div>
          <div class="form-group">
            <label for="password">Admin password</label>
            <input type="password" id="password" name="password" placeholder="Enter admin password" required>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%;">
            <i data-lucide="shield" style="width: 16px; height: 16px;"></i>
            Log in
          </button>
        </form>
      </div>

      <div class="admin-panel" id="admin-panel">
        <div class="alert" id="admin-alert"></div>

        <div class="toolbar">
          <div class="tabs">
            <button class="tab active" data-status="pending">Pending</button>
            <button class="tab" data-status="approved">Approved</button>
            <button class="tab" data-status="rejected">Rejected</button>
            <button class="tab" data-view="members">Members</button>
          </div>
          <button class="btn btn-secondary" id="logout-btn">
            <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
            Log out
          </button>
        </div>

        <div id="applications-list"></div>
        <div id="members-list" style="display:none;"></div>
      </div>
    </div>
  </main>

  <script>
    lucide.createIcons();

    const API_URL = '/ai-club/api';
    let currentStatus = 'pending';

    const loginCard = document.getElementById('login-card');
    const adminPanel = document.getElementById('admin-panel');
    const loginAlert = document.getElementById('login-alert');
    const adminAlert = document.getElementById('admin-alert');

    async function api(path, options = {}) {
      const res = await fetch(`${API_URL}${path}`, {
        ...options,
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json',
          ...options.headers
        }
      });
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, status: res.status, data };
    }

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      loginAlert.className = 'alert';
      const identifier = e.target.identifier.value.trim();
      const payload = identifier.includes('@')
        ? { email: identifier, password: e.target.password.value }
        : { username: identifier, password: e.target.password.value };
      const { ok, data } = await api('/admin/login', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      if (ok) {
        loginCard.style.display = 'none';
        adminPanel.style.display = 'block';
        loadApplications();
      } else {
        loginAlert.className = 'alert show error';
        loginAlert.textContent = data.error || 'Invalid password';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await api('/admin/logout', { method: 'POST' });
      loginCard.style.display = 'block';
      adminPanel.style.display = 'none';
    });

    let currentView = 'applications';

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const appList = document.getElementById('applications-list');
        const memberList = document.getElementById('members-list');
        if (tab.dataset.view === 'members') {
          currentView = 'members';
          appList.style.display = 'none';
          memberList.style.display = 'block';
          loadMembers();
        } else {
          currentView = 'applications';
          currentStatus = tab.dataset.status;
          memberList.style.display = 'none';
          appList.style.display = 'block';
          loadApplications();
        }
      });
    });

    async function loadApplications() {
      const list = document.getElementById('applications-list');
      list.innerHTML = '<div class="empty">Loading...</div>';

      const { ok, data } = await api(`/admin/applications?status=${currentStatus}`);
      if (!ok) {
        list.innerHTML = `<div class="empty">Failed to load applications: ${data.error}</div>`;
        return;
      }

      if (data.length === 0) {
        list.innerHTML = `<div class="empty">No ${currentStatus} applications.</div>`;
        return;
      }

      list.innerHTML = data.map(app => `
        <div class="application-card">
          <h3>${escapeHtml(app.name)}</h3>
          <div class="meta">Applied ${new Date(app.created_at).toLocaleString()}</div>
          <div class="field"><strong>Intra username</strong> ${escapeHtml(app.intra_username)}</div>
          <div class="field"><strong>Email</strong> ${escapeHtml(app.email)}</div>
          <div class="field"><strong>Level</strong> ${escapeHtml(app.level || 'Not specified')}</div>
          <div class="field"><strong>Message</strong> ${escapeHtml(app.message || 'No message')}</div>
          ${currentStatus === 'pending' ? `
            <div class="actions">
              <button class="btn btn-success" onclick="approve(${app.id})">
                <i data-lucide="check" style="width: 16px; height: 16px;"></i>
                Approve & create account
              </button>
              <button class="btn btn-danger" onclick="reject(${app.id})">
                <i data-lucide="x" style="width: 16px; height: 16px;"></i>
                Reject
              </button>
            </div>
          ` : ''}
        </div>
      `).join('');
      lucide.createIcons();
    }

    async function approve(id) {
      if (!confirm('Approve this application and create a member account?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/approve', {
        method: 'POST',
        body: JSON.stringify({ application_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok
        ? `Approved! Temporary password: ${data.temp_password}`
        : (data.error || 'Failed to approve');
      if (ok) loadApplications();
    }

    async function reject(id) {
      if (!confirm('Reject this application?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/reject', {
        method: 'POST',
        body: JSON.stringify({ application_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Application rejected' : (data.error || 'Failed to reject');
      if (ok) loadApplications();
    }

    async function loadMembers() {
      const list = document.getElementById('members-list');
      list.innerHTML = '<div class="empty">Loading members...</div>';

      const { ok, data } = await api('/admin/members');
      if (!ok) {
        list.innerHTML = `<div class="empty">Failed to load members: ${data.error}</div>`;
        return;
      }

      if (data.length === 0) {
        list.innerHTML = '<div class="empty">No members found.</div>';
        return;
      }

      list.innerHTML = data.map(member => {
        const roleClass = member.role === 'superadmin' ? 'role-superadmin' : (member.role === 'admin' ? 'role-admin' : 'role-member');
        const canPromote = member.role === 'member';
        const canDemote = member.role === 'admin';
        const isSuper = member.role === 'superadmin';
        return `
          <div class="member-card">
            <div class="info">
              <h3>${escapeHtml(member.name)}</h3>
              <div class="field"><strong>Email</strong> ${escapeHtml(member.email)}</div>
              <div class="field"><strong>Intra</strong> ${escapeHtml(member.intra_username || 'N/A')}</div>
              <span class="role ${roleClass}">${member.role}</span>
            </div>
            <div class="actions">
              ${canPromote ? `<button class="btn btn-success" onclick="promoteMember(${member.id})">Promote to admin</button>` : ''}
              ${canDemote ? `<button class="btn btn-danger" onclick="demoteMember(${member.id})">Demote to member</button>` : ''}
              ${isSuper ? '<span style="color:var(--text-muted);font-size:0.9rem;">Superadmin</span>' : ''}
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function promoteMember(id) {
      if (!confirm('Promote this member to admin?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/promote', {
        method: 'POST',
        body: JSON.stringify({ user_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Member promoted to admin.' : (data.error || 'Failed to promote');
      if (ok) loadMembers();
    }

    async function demoteMember(id) {
      if (!confirm('Demote this admin to regular member?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/demote', {
        method: 'POST',
        body: JSON.stringify({ user_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Admin demoted to member.' : (data.error || 'Failed to demote');
      if (ok) loadMembers();
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Check if already logged in
    (async () => {
      const { ok } = await api('/admin/applications?status=pending');
      if (ok) {
        loginCard.style.display = 'none';
        adminPanel.style.display = 'block';
        loadApplications();
      }
    })();
  </script>
</body>
</html>
