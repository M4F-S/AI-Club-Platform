<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%23120a0d'/%3E%3Cpath d='M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z' fill='%23f43f5e'/%3E%3Cpath d='M16 6 C14 9, 13 13, 14 16 C12 15, 10 15, 9 17 C8 18, 9 20, 11 21 C10 22, 11 23, 12 24 C13 24, 14 23, 15 22 C15 24, 16 25, 17 25 C18 25, 18 24, 18 22 C19 23, 20 24, 21 24 C22 23, 23 22, 22 21 C24 20, 25 18, 24 17 C23 15, 21 15, 19 16 C20 13, 19 9, 16 6 Z' fill='%23f2cc8f'/%3E%3C/svg%3E">
  <title>Admin — 42 Berlin AI Club</title>
  <meta name="robots" content="noindex, nofollow">
  <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" as="style">
  <link rel="preload" href="/assets/ai-club.css?v=11" as="style">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/ai-club.css?v=11">
  <style>
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #faf8f7 0%, #fff1f2 100%);
    }

    main { padding: 120px 24px 80px; }

    .form-header {
      text-align: center;
      margin-bottom: 40px;
    }

    .form-header h1 {
      font-family: var(--font-heading);
      font-size: clamp(1.8rem, 5vw, 2.5rem);
    }

    .login-card, .admin-panel {
      max-width: 460px;
      margin: 0 auto;
      background: var(--color-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px;
      box-shadow: var(--shadow-lg);
    }

    .admin-panel { max-width: 900px; display: none; }

    .login-card .form-group {
      margin-bottom: 20px;
    }

    .login-card label {
      display: block;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .login-card input,
    .admin-panel input,
    .admin-panel select,
    .admin-panel textarea {
      width: 100%;
      padding: 12px 14px;
      background: var(--color-bg);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: inherit;
      font-size: 1rem;
    }

    .login-card input:focus,
    .admin-panel input:focus,
    .admin-panel select:focus,
    .admin-panel textarea:focus {
      outline: none;
      border-color: var(--color-accent);
      background: var(--color-surface);
    }

    .admin-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 18px;
      border-radius: 10px;
      font-weight: 600;
      font-size: 0.95rem;
      text-decoration: none;
      transition: all 0.2s;
      cursor: pointer;
      border: none;
    }

    .admin-btn-primary {
      background: linear-gradient(135deg, var(--color-accent), var(--color-secondary));
      color: #ffffff;
    }

    .admin-btn-primary:hover { transform: translateY(-2px); }
    .admin-btn-success { background: #2a7a4a; color: white; }
    .admin-btn-danger { background: #c92a2a; color: white; }
    .admin-btn-secondary { background: #e9ecef; color: var(--text); }

    .toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 24px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .tabs {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab {
      padding: 8px 16px;
      border-radius: 100px;
      border: 1px solid var(--border);
      background: transparent;
      cursor: pointer;
      font-weight: 500;
      transition: all 0.2s;
    }

    .tab.active {
      background: var(--text);
      color: var(--color-bg);
      border-color: var(--text);
    }

    .application-card {
      background: var(--color-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .application-card h3 {
      font-family: var(--font-heading);
      margin-bottom: 4px;
    }

    .meta {
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 12px;
    }

    .field {
      margin-bottom: 10px;
      font-size: 0.95rem;
    }

    .field strong {
      display: inline-block;
      width: 140px;
      color: var(--text-muted);
      font-weight: 500;
    }

    .actions {
      display: flex;
      gap: 10px;
      margin-top: 16px;
      flex-wrap: wrap;
    }

    .member-card {
      background: var(--color-bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 12px;
    }

    .member-card .info { flex: 1; min-width: 220px; }
    .member-card .info h3 {
      font-family: var(--font-heading);
      margin-bottom: 4px;
    }
    .member-card .role {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      margin-top: 6px;
    }
    .role-superadmin { background: var(--color-accent); color: #fff; }
    .role-admin { background: var(--sage); color: #fff; }
    .role-member { background: #e9ecef; color: var(--text); }

    .empty {
      text-align: center;
      color: var(--text-muted);
      padding: 40px;
    }

    .alert {
      padding: 12px 14px;
      border-radius: 12px;
      margin-bottom: 16px;
      display: none;
    }

    .alert.show { display: block; }
    .alert.error { background: var(--color-error-bg); border: 1px solid rgba(201, 42, 42, 0.2); color: var(--color-error); }
    .alert.success { background: var(--color-success-bg); border: 1px solid rgba(42, 122, 74, 0.2); color: var(--color-success); }

    @media (max-width: 768px) {
      main { padding: 100px 20px 48px; }
      .login-card, .admin-panel { padding: 24px; }
      .field strong { display: block; width: auto; }
      .actions { flex-direction: column; }
      .toolbar { flex-direction: column; align-items: flex-start; }
      .member-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>
  <a href="#main-content" class="skip-link">Skip to main content</a>
  <header role="banner">
    <nav aria-label="Main">
      <a href="/" class="logo">
        <div class="logo-icon" aria-hidden="true">
          <svg viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="phoenixGrad" x1="0%" y1="100%" x2="0%" y2="0%">
                <stop offset="0%" style="stop-color:#c65d3b"/>
                <stop offset="50%" style="stop-color:#f43f5e"/>
                <stop offset="100%" style="stop-color:#f2cc8f"/>
              </linearGradient>
            </defs>
            <path d="M16 2 C13 6, 12 11, 14 15 C11 13, 7 14, 5 17 C4 19, 5 22, 8 23 C7 25, 8 27, 10 28 C12 29, 14 28, 15 26 C15 28, 16 30, 17 30 C18 30, 18 28, 18 26 C19 28, 21 29, 23 28 C25 27, 26 25, 25 23 C28 22, 29 19, 27 17 C25 14, 21 13, 18 15 C20 11, 19 6, 16 2 Z" fill="url(#phoenixGrad)"/>
            <path d="M16 6 C14 9, 13 13, 14 16 C12 15, 10 15, 9 17 C8 18, 9 20, 11 21 C10 22, 11 23, 12 24 C13 24, 14 23, 15 22 C15 24, 16 25, 17 25 C18 25, 18 24, 18 22 C19 23, 20 24, 21 24 C22 23, 23 22, 22 21 C24 20, 25 18, 24 17 C23 15, 21 15, 19 16 C20 13, 19 9, 16 6 Z" fill="#faf3f0" opacity="0.4"/>
          </svg>
        </div>
        <span>42 Berlin AI Club</span>
      </a>
      <button class="mobile-menu-toggle" aria-label="Toggle menu" aria-expanded="false">&#9776;</button>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/members/">Dashboard</a></li>
        <li><a href="/">Public site</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content">
    <div class="form-header">
      <h1>Admin <span class="text-gradient">panel</span></h1>
    </div>

    <div class="login-card" id="login-card">
      <div class="alert" id="login-alert"></div>
      <form id="admin-login-form">
        <div class="form-group">
          <label for="admin-identifier">Admin email or username</label>
          <input type="text" id="admin-identifier" name="identifier" placeholder="mfathy" required autofocus>
        </div>
        <div class="form-group">
          <label for="password">Admin password</label>
          <input type="password" id="password" name="password" placeholder="Enter admin password" required>
        </div>
        <button type="submit" class="admin-btn admin-btn-primary" style="width: 100%;">
          <i data-lucide="shield" style="width: 16px; height: 16px;"></i>
          Log in
        </button>
      </form>
    </div>

    <div class="admin-panel" id="admin-panel">
      <div class="alert" id="admin-alert"></div>

      <div class="toolbar">
        <div class="tabs">
          <button class="tab active" data-status="pending">Pending</button>
          <button class="tab" data-status="approved">Approved</button>
          <button class="tab" data-status="rejected">Rejected</button>
          <button class="tab" data-view="members">Members</button>
          <button class="tab" data-view="partners">Partners</button>
          <button class="tab" data-view="events">Events</button>
        </div>
        <button class="admin-btn admin-btn-secondary" id="logout-btn">
          <i data-lucide="log-out" style="width: 16px; height: 16px;"></i>
          Log out
        </button>
      </div>

      <div id="applications-list"></div>
      <div id="members-list" style="display:none;"></div>
      <div id="partners-list" style="display:none;"></div>
      <div id="events-list" style="display:none;"></div>
    </div>
  </main>

  <script src="/assets/ai-club.js?v=12" defer></script>
  <script>
    if (window.lucide) lucide.createIcons();

    const API_URL = '/api';
    let currentStatus = 'pending';

    const loginCard = document.getElementById('login-card');
    const adminPanel = document.getElementById('admin-panel');
    const loginAlert = document.getElementById('login-alert');
    const adminAlert = document.getElementById('admin-alert');

    async function api(path, options = {}) {
      const res = await fetch(`${API_URL}${path}`, {
        ...options,
        credentials: 'include',
        headers: {
          'Content-Type': 'application/json',
          ...options.headers
        }
      });
      const data = await res.json().catch(() => ({}));
      return { ok: res.ok, status: res.status, data };
    }

    document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      loginAlert.className = 'alert';
      const identifier = e.target.identifier.value.trim();
      const payload = identifier.includes('@')
        ? { email: identifier, password: e.target.password.value }
        : { username: identifier, password: e.target.password.value };
      const { ok, data } = await api('/member/login', {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      if (ok) {
        loginCard.style.display = 'none';
        adminPanel.style.display = 'block';
        loadApplications();
      } else {
        loginAlert.className = 'alert show error';
        loginAlert.textContent = data.error || 'Invalid password';
      }
    });

    document.getElementById('logout-btn').addEventListener('click', async () => {
      await api('/member/logout', { method: 'POST' });
      loginCard.style.display = 'block';
      adminPanel.style.display = 'none';
    });

    let currentView = 'applications';

    document.querySelectorAll('.tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        tab.classList.add('active');
        const appList = document.getElementById('applications-list');
        const memberList = document.getElementById('members-list');
        const partnerList = document.getElementById('partners-list');
        const eventsList = document.getElementById('events-list');
        if (tab.dataset.view === 'members') {
          currentView = 'members';
          appList.style.display = 'none';
          memberList.style.display = 'block';
          partnerList.style.display = 'none';
          eventsList.style.display = 'none';
          loadMembers();
        } else if (tab.dataset.view === 'partners') {
          currentView = 'partners';
          appList.style.display = 'none';
          memberList.style.display = 'none';
          partnerList.style.display = 'block';
          eventsList.style.display = 'none';
          loadPartners();
        } else if (tab.dataset.view === 'events') {
          currentView = 'events';
          appList.style.display = 'none';
          memberList.style.display = 'none';
          partnerList.style.display = 'none';
          eventsList.style.display = 'block';
          loadEvents();
        } else {
          currentView = 'applications';
          currentStatus = tab.dataset.status;
          memberList.style.display = 'none';
          partnerList.style.display = 'none';
          eventsList.style.display = 'none';
          appList.style.display = 'block';
          loadApplications();
        }
      });
    });

    async function loadApplications() {
      const list = document.getElementById('applications-list');
      list.innerHTML = '<div class="empty">Loading...</div>';

      const { ok, data } = await api(`/admin/applications?status=${currentStatus}`);
      if (!ok) {
        list.innerHTML = `<div class="empty">Failed to load applications: ${escapeHtml(data.error)}</div>`;
        return;
      }

      if (data.length === 0) {
        list.innerHTML = `<div class="empty">No ${currentStatus} applications.</div>`;
        return;
      }

      list.innerHTML = data.map(app => `
        <div class="application-card">
          <h3>${escapeHtml(app.name)}</h3>
          <div class="meta">Applied ${new Date(app.created_at).toLocaleString()}</div>
          <div class="field"><strong>Intra username</strong> ${escapeHtml(app.intra_username)}</div>
          <div class="field"><strong>Email</strong> ${escapeHtml(app.email)}</div>
          <div class="field"><strong>Level</strong> ${escapeHtml(app.level || 'Not specified')}</div>
          <div class="field"><strong>Message</strong> ${escapeHtml(app.message || 'No message')}</div>
          ${currentStatus === 'pending' ? `
            <div class="actions">
              <button class="admin-btn admin-btn-success" onclick="approve(${app.id})">
                <i data-lucide="check" style="width: 16px; height: 16px;"></i>
                Approve & create account
              </button>
              <button class="admin-btn admin-btn-danger" onclick="reject(${app.id})">
                <i data-lucide="x" style="width: 16px; height: 16px;"></i>
                Reject
              </button>
            </div>
          ` : ''}
        </div>
      `).join('');
      lucide.createIcons();
    }

    async function approve(id) {
      if (!confirm('Approve this application and create a member account?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/approve', {
        method: 'POST',
        body: JSON.stringify({ application_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok
        ? `Approved! Temporary password: ${data.temp_password}`
        : (data.error || 'Failed to approve');
      if (ok) loadApplications();
    }

    async function reject(id) {
      if (!confirm('Reject this application?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/reject', {
        method: 'POST',
        body: JSON.stringify({ application_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Application rejected' : (data.error || 'Failed to reject');
      if (ok) loadApplications();
    }

    async function loadMembers() {
      const list = document.getElementById('members-list');
      list.innerHTML = '<div class="empty">Loading members...</div>';

      const { ok, data } = await api('/admin/members');
      if (!ok) {
        list.innerHTML = `<div class="empty">Failed to load members: ${escapeHtml(data.error)}</div>`;
        return;
      }

      if (data.length === 0) {
        list.innerHTML = '<div class="empty">No members found.</div>';
        return;
      }

      list.innerHTML = data.map(member => {
        const roleClass = member.role === 'superadmin' ? 'role-superadmin' : (member.role === 'admin' ? 'role-admin' : 'role-member');
        const canPromote = member.role === 'member';
        const canDemote = member.role === 'admin';
        const isSuper = member.role === 'superadmin';
        return `
          <div class="member-card">
            <div class="info">
              <h3>${escapeHtml(member.name)}</h3>
              <div class="field"><strong>Email</strong> ${escapeHtml(member.email)}</div>
              <div class="field"><strong>Intra</strong> ${escapeHtml(member.intra_username || 'N/A')}</div>
              <span class="role ${roleClass}">${member.role}</span>
            </div>
            <div class="actions">
              ${canPromote ? `<button class="admin-btn admin-btn-success" onclick="promoteMember(${member.id})">Promote to admin</button>` : ''}
              ${canDemote ? `<button class="admin-btn admin-btn-danger" onclick="demoteMember(${member.id})">Demote to member</button>` : ''}
              ${!isSuper ? `<button class="admin-btn admin-btn-danger" onclick="deleteMember(${member.id})">🗑️ Delete</button>` : ''}
              ${isSuper ? '<span style="color:var(--text-muted);font-size:0.9rem;">Superadmin</span>' : ''}
            </div>
          </div>
        `;
      }).join('');
      lucide.createIcons();
    }

    async function promoteMember(id) {
      if (!confirm('Promote this member to admin?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/promote', {
        method: 'POST',
        body: JSON.stringify({ user_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Member promoted to admin.' : (data.error || 'Failed to promote');
      if (ok) loadMembers();
    }

    async function demoteMember(id) {
      if (!confirm('Demote this admin to regular member?')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/demote', {
        method: 'POST',
        body: JSON.stringify({ user_id: id })
      });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Admin demoted to member.' : (data.error || 'Failed to demote');
      if (ok) loadMembers();
    }

    async function loadPartners() {
      const list = document.getElementById('partners-list');
      list.innerHTML = '<div class="empty">Loading partner inquiries...</div>';

      const { ok, data } = await api('/admin/partner-inquiries');
      if (!ok) {
        list.innerHTML = `<div class="empty">Failed to load partner inquiries: ${escapeHtml(data.error)}</div>`;
        return;
      }

      if (data.length === 0) {
        list.innerHTML = '<div class="empty">No partner inquiries.</div>';
        return;
      }

      list.innerHTML = data.map(inq => `
        <div class="application-card">
          <h3>${escapeHtml(inq.organization)}</h3>
          <div class="meta">Submitted ${new Date(inq.created_at).toLocaleString()}</div>
          <div class="field"><strong>Contact</strong> ${escapeHtml(inq.contact_name)}</div>
          <div class="field"><strong>Email</strong> ${escapeHtml(inq.email)}</div>
          <div class="field"><strong>Type</strong> ${escapeHtml(inq.partnership_type)}</div>
          <div class="field"><strong>Message</strong> ${escapeHtml(inq.message || 'No message')}</div>
          <div class="actions">
            <button class="admin-btn admin-btn-danger" onclick="deletePartnerInquiry(${inq.id})">🗑️ Delete</button>
          </div>
        </div>
      `).join('');
      lucide.createIcons();
    }

    async function loadEvents() {
      const list = document.getElementById('events-list');
      list.innerHTML = '<div class="empty">Loading events...</div>';

      const { ok, data } = await api('/admin/events');
      if (!ok) {
        list.innerHTML = `<div class="empty">Failed to load events: ${escapeHtml(data.error)}</div>`;
        return;
      }

      let html = `
        <div class="toolbar" style="margin-bottom: 24px;">
          <button class="admin-btn admin-btn-primary" onclick="showCreateEventForm()">
            <i data-lucide="plus" style="width: 16px; height: 16px;"></i> Create Event
          </button>
        </div>
        <div id="create-event-form" style="display:none; margin-bottom: 24px;">
          <div class="application-card">
            <h3>Create New Event</h3>
            <div class="form-group" style="margin-top: 12px;">
              <input type="text" id="event-title" placeholder="Event title" style="width: 100%; margin-bottom: 10px;">
              <input type="text" id="event-slug" placeholder="URL slug (e.g. defensible-ai)" style="width: 100%; margin-bottom: 10px;">
              <textarea id="event-description" placeholder="Description" style="width: 100%; margin-bottom: 10px; min-height: 60px;"></textarea>
              <input type="datetime-local" id="event-date" style="width: 100%; margin-bottom: 10px;">
              <input type="text" id="event-location" placeholder="Location" style="width: 100%; margin-bottom: 10px;">
              <select id="event-type" style="width: 100%; margin-bottom: 10px;">
                <option value="workshop">Workshop</option>
                <option value="talk">Talk</option>
                <option value="meetup">Meetup</option>
              </select>
              <label style="display: flex; align-items: center; gap: 8px; margin-bottom: 10px;">
                <input type="checkbox" id="event-public" checked> Public event
              </label>
              <div class="actions">
                <button class="admin-btn admin-btn-success" onclick="createEvent()">Create</button>
                <button class="admin-btn admin-btn-secondary" onclick="hideCreateEventForm()">Cancel</button>
              </div>
            </div>
          </div>
        </div>
      `;

      if (data.length === 0) {
        html += '<div class="empty">No events yet. Create one above.</div>';
      } else {
        html += data.map(event => `
          <div class="application-card" style="margin-bottom: 16px;">
            <div style="display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px;">
              <div>
                <h3>${escapeHtml(event.title)}</h3>
                <div class="meta">
                  ${event.event_date ? new Date(event.event_date).toLocaleString() : 'Date TBD'}
                  ${event.location ? '· ' + escapeHtml(event.location) : ''}
                  · ${event.event_type}
                  · ${event.is_public ? 'Public' : 'Members-only'}
                </div>
                <div class="field"><strong>Slug</strong> ${escapeHtml(event.slug || 'N/A')}</div>
                <div class="field"><strong>Description</strong> ${escapeHtml(event.description || 'No description')}</div>
              </div>
              <div class="actions">
                <button class="admin-btn admin-btn-danger" onclick="deleteEvent(${event.id})">🗑️ Delete</button>
              </div>
            </div>
            <div style="margin-top: 16px; padding-top: 16px; border-top: 1px solid var(--border);">
              <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px;">
                <strong>Materials</strong>
                <span class="meta" id="material-count-${event.id}">Loading...</span>
              </div>
              <div id="materials-${event.id}"></div>
              <div style="margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border);">
                <strong>Add Materials</strong>
                <div style="margin-top: 12px; display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px;">
                  <!-- Upload Slides -->
                  <div style="background: var(--color-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px;">
                    <div style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
                      <span style="font-size: 1.2rem;">🎞️</span> Slides
                    </div>
                    <input type="file" id="upload-slide-${event.id}" accept="image/*" style="width: 100%; font-size: 0.85rem; margin-bottom: 8px;">
                    <input type="text" id="upload-slide-title-${event.id}" placeholder="Title (optional)" style="width: 100%; margin-bottom: 8px; font-size: 0.85rem;">
                    <input type="number" id="upload-slide-sort-${event.id}" value="0" placeholder="Order" style="width: 100%; margin-bottom: 8px; font-size: 0.85rem;">
                    <button class="admin-btn admin-btn-primary" style="width: 100%; font-size: 0.85rem;" onclick="uploadSlide(${event.id})">Upload Slide</button>
                  </div>
                  <!-- Upload Quiz -->
                  <div style="background: var(--color-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px;">
                    <div style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
                      <span style="font-size: 1.2rem;">🎯</span> Quiz
                    </div>
                    <input type="file" id="upload-quiz-${event.id}" accept=".html,.json" style="width: 100%; font-size: 0.85rem; margin-bottom: 8px;">
                    <input type="text" id="upload-quiz-title-${event.id}" placeholder="Quiz title" style="width: 100%; margin-bottom: 8px; font-size: 0.85rem;">
                    <input type="number" id="upload-quiz-sort-${event.id}" value="0" placeholder="Order" style="width: 100%; margin-bottom: 8px; font-size: 0.85rem;">
                    <button class="admin-btn admin-btn-primary" style="width: 100%; font-size: 0.85rem;" onclick="uploadQuiz(${event.id})">Upload Quiz</button>
                  </div>
                  <!-- Upload Files -->
                  <div style="background: var(--color-bg); border: 1px solid var(--border); border-radius: 8px; padding: 14px;">
                    <div style="font-weight: 600; font-size: 0.9rem; margin-bottom: 8px; display: flex; align-items: center; gap: 6px;">
                      <span style="font-size: 1.2rem;">📄</span> Files
                    </div>
                    <input type="file" id="upload-file-${event.id}" style="width: 100%; font-size: 0.85rem; margin-bottom: 8px;">
                    <input type="text" id="upload-file-title-${event.id}" placeholder="File title" style="width: 100%; margin-bottom: 8px; font-size: 0.85rem;">
                    <input type="number" id="upload-file-sort-${event.id}" value="0" placeholder="Order" style="width: 100%; margin-bottom: 8px; font-size: 0.85rem;">
                    <button class="admin-btn admin-btn-primary" style="width: 100%; font-size: 0.85rem;" onclick="uploadFile(${event.id})">Upload File</button>
                  </div>
                </div>
              </div>          </div>
        `).join('');
      }

      list.innerHTML = html;
      lucide.createIcons();

      // Load materials for each event
      if (data.length > 0) {
        for (const event of data) {
          loadEventMaterials(event.id);
        }
      }
    }

    function showCreateEventForm() {
      document.getElementById('create-event-form').style.display = 'block';
    }

    function hideCreateEventForm() {
      document.getElementById('create-event-form').style.display = 'none';
      document.getElementById('event-title').value = '';
      document.getElementById('event-slug').value = '';
      document.getElementById('event-description').value = '';
      document.getElementById('event-date').value = '';
      document.getElementById('event-location').value = '';
    }

    async function createEvent() {
      adminAlert.className = 'alert';
      const title = document.getElementById('event-title').value.trim();
      const slug = document.getElementById('event-slug').value.trim().toLowerCase();
      const description = document.getElementById('event-description').value.trim();
      const eventDate = document.getElementById('event-date').value;
      const location = document.getElementById('event-location').value.trim();
      const eventType = document.getElementById('event-type').value;
      const isPublic = document.getElementById('event-public').checked;

      if (!title) {
        adminAlert.className = 'alert show error';
        adminAlert.textContent = 'Title is required';
        return;
      }

      const payload = {
        title,
        slug: slug || undefined,
        description,
        event_date: eventDate ? new Date(eventDate).toISOString() : undefined,
        location,
        event_type: eventType,
        is_public: isPublic
      };

      const { ok, data } = await api('/admin/events', {
        method: 'POST',
        body: JSON.stringify(payload)
      });

      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Event created!' : (data.error || 'Failed to create event');
      if (ok) {
        hideCreateEventForm();
        loadEvents();
      }
    }

    async function deleteEvent(id) {
      if (!confirm('Delete this event and all its materials? This cannot be undone.')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/events/' + id, { method: 'DELETE' });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Event deleted.' : (data.error || 'Failed to delete event');
      if (ok) loadEvents();
    }

    async function loadEventMaterials(eventId) {
      const container = document.getElementById('materials-' + eventId);
      const countEl = document.getElementById('material-count-' + eventId);
      if (!container) return;

      const { ok, data } = await api('/admin/events/' + eventId + '/materials');
      if (!ok) {
        container.innerHTML = '<div class="empty">Failed to load materials</div>';
        if (countEl) countEl.textContent = 'Error';
        return;
      }

      if (countEl) countEl.textContent = data.length + ' material(s)';

      if (data.length === 0) {
        container.innerHTML = '<div class="empty" style="padding: 16px;">No materials uploaded.</div>';
        return;
      }

      container.innerHTML = data.map(m => `
        <div style="display: flex; justify-content: space-between; align-items: center; padding: 10px; background: var(--color-bg); border-radius: 8px; margin-bottom: 8px;">
          <div>
            <strong>${escapeHtml(m.title)}</strong>
            <span class="meta" style="margin-left: 8px;">${m.file_type} · ${m.is_revealed ? 'Revealed' : 'Hidden'}</span>
          </div>
          <div class="actions">
            <button class="admin-btn ${m.is_revealed ? 'admin-btn-secondary' : 'admin-btn-success'}" onclick="toggleMaterialReveal(${eventId}, ${m.id})" style="font-size: 0.85rem; padding: 6px 12px;">
              ${m.is_revealed ? 'Hide' : 'Reveal'}
            </button>
            <button class="admin-btn admin-btn-danger" onclick="deleteMaterial(${eventId}, ${m.id})" style="font-size: 0.85rem; padding: 6px 12px;">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    async function toggleMaterialReveal(eventId, materialId) {
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/events/' + eventId + '/materials/' + materialId + '/reveal', { method: 'POST' });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? (data.message || 'Toggled') : (data.error || 'Failed');
      if (ok) loadEventMaterials(eventId);
    }

    async function deleteMaterial(eventId, materialId) {
      if (!confirm('Delete this material? This cannot be undone.')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/events/' + eventId + '/materials/' + materialId, { method: 'DELETE' });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Material deleted.' : (data.error || 'Failed to delete');
      if (ok) loadEventMaterials(eventId);
    }

    async function deleteMember(id) {
      if (!confirm('Delete this member account? This cannot be undone.')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/members/' + id, { method: 'DELETE' });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Member deleted.' : (data.error || 'Failed to delete member');
      if (ok) loadMembers();
    }

    async function deletePartnerInquiry(id) {
      if (!confirm('Delete this partner inquiry? This cannot be undone.')) return;
      adminAlert.className = 'alert';
      const { ok, data } = await api('/admin/partner-inquiries/' + id, { method: 'DELETE' });
      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Partner inquiry deleted.' : (data.error || 'Failed to delete');
      if (ok) loadPartners();
    }

    async function uploadMaterial(eventId, fileType, fileInputId, titleInputId, sortInputId) {
      const fileInput = document.getElementById(fileInputId);
      const titleInput = document.getElementById(titleInputId);
      const sortInput = document.getElementById(sortInputId);

      if (!fileInput.files || !fileInput.files[0]) {
        adminAlert.className = 'alert show error';
        adminAlert.textContent = 'Please select a file';
        return;
      }

      const formData = new FormData();
      formData.append('file', fileInput.files[0]);
      formData.append('title', titleInput.value || fileInput.files[0].name);
      formData.append('file_type', fileType);
      formData.append('sort_order', sortInput.value || 0);
      formData.append('is_revealed', 'false');

      const { ok, data } = await api('/admin/events/' + eventId + '/materials', {
        method: 'POST',
        body: formData
      });

      adminAlert.className = `alert show ${ok ? 'success' : 'error'}`;
      adminAlert.textContent = ok ? 'Material uploaded!' : (data.error || 'Upload failed');
      if (ok) {
        fileInput.value = '';
        titleInput.value = '';
        loadEventMaterials(eventId);
      }
    }

    async function uploadSlide(eventId) {
      await uploadMaterial(eventId, 'slide', 'upload-slide-' + eventId, 'upload-slide-title-' + eventId, 'upload-slide-sort-' + eventId);
    }

    async function uploadQuiz(eventId) {
      await uploadMaterial(eventId, 'quiz', 'upload-quiz-' + eventId, 'upload-quiz-title-' + eventId, 'upload-quiz-sort-' + eventId);
    }

    async function uploadFile(eventId) {
      // Auto-detect PDF vs generic file
      const fileInput = document.getElementById('upload-file-' + eventId);
      let fileType = 'file';
      if (fileInput.files && fileInput.files[0]) {
        const name = fileInput.files[0].name.toLowerCase();
        if (name.endsWith('.pdf')) fileType = 'pdf';
      }
      await uploadMaterial(eventId, fileType, 'upload-file-' + eventId, 'upload-file-title-' + eventId, 'upload-file-sort-' + eventId);
    }
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // Check if already logged in
    (async () => {
      const { ok } = await api('/admin/applications?status=pending');
      if (ok) {
        loginCard.style.display = 'none';
        adminPanel.style.display = 'block';
        loadApplications();
      }
    })();
  </script>
</body>
</html>
